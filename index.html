  <style>
    :root {
      --primary-green: #004d26; /* اسکرین شاٹ والا ہرا رنگ */
      --accent-gold: #ffd700;   /* سنہرا رنگ */
      --bg-color: white;      /* ہلکا سبز بیک گراؤنڈ */
      --card-bg: #cae8eb;       /* کارڈ کا رنگ */
    }

    body { 
      font-family: 'Gulzar', serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    /* مین کارڈ کنٹینر */
    .container {
      max-width: 360px;
      width: 100%;
      background: var(--card-bg);
      border: 2px solid var(--primary-green);
      border-radius: 15px;
      padding: 5px;
      text-align: center;
      min-height: 90vh;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* اوپر کا لوگو والا حصہ */
    .header-section {
      margin-bottom: 50px;
    }

img {
      width: 320px;
      height: 140px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      margin: 10px auto;
      display: block; /* سینٹر کرنے کے لیے */
    }

    .main-title {
      background-color: black;
      color: white;
      padding: 1px 50px;
      border-radius: 40px 40px;
      display: inline-block;
      font-size: 22px;
      margin-bottom: 30px;
    }

    /* بٹنوں کی ترتیب (دو کالمز) */
    .btn-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      font-family: 'Gulzar', serif;
      background: black;
      color: white;
      padding: 12px 1px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.8);
      transition: 0.3s;
    }

    button:active { transform: scale(0.95); }

    .page { display: none; animation: fadeIn 0.5s; }
    #home-page { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* فوٹر اور رابطہ */
    .footer-box {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.1);
      border-radius: 15px;
      font-size: 14px;
      color: #333;
    }

    /* پی ڈی ایف ویور */
    #pdf-view-page {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 9999;
    }

    iframe { width: 100%; height: calc(100% - 60px); border: none; }
    
    .viewer-header {
      height: 60px; background: var(--primary-green);
      display: flex; justify-content: space-between;
      align-items: center; padding: 0 15px; color: white;
    }
  .btn-blue {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }
    
    .btn-blue a {
      flex: 1;
      text-decoration: none;
    }

    .btn-blue button {
      width: 100%; /* لنک کے اندر بٹن پوری جگہ لے گا */
      padding: 10px 5px;
      font-size: 14px;
    }
.back-btn { background: #555; width: 100%; margin-top: 20px; 
    }
  </style>
</head>

  function showHomePage() { hideAllPages(); document.getElementById('home-page').style.display = 'block'; }
  function showJamatPage() { hideAllPages(); document.getElementById('jamat-page').style.display = 'block'; }
  function showtaqreerPage() { hideAllPages(); document.getElementById('taqreer-page').style.display = 'block'; }
  function hideAllPages() { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); }

  function renderBooks(filterValue, type) {
    hideAllPages();
    const listPage = document.getElementById('books-list-page');
    const listContainer = document.getElementById('books-list');
    const titleHeader = document.getElementById('list-title');
    listContainer.innerHTML = "";
    
    titleHeader.innerText = filterValue;

    const filtered = allBooks.filter(b => type === 'jamat' ? b.jamat === filterValue : (type === 'taqreer' ? b.jamat === filterValue : b.cat === filterValue));

    if(filtered.length === 0) {
      listContainer.innerHTML = "<p style='grid-column: 1/3;'>جلد شامل کی جائیں گی ان شاء اللہ</p>";
    } else {
      filtered.forEach(book => {
        const btn = document.createElement('button');
        btn.innerHTML = "📖 " + book.title;
        btn.onclick = () => openBook(book.title, book.link);
        listContainer.appendChild(btn);
      });
    }

    // واپسی کا بٹن سیٹ کریں
    const backBtn = document.getElementById('dynamic-back-btn');
    if (type === 'jamat') {
        backBtn.onclick = showJamatPage;
    } else if (type === 'taqreer') {
        backBtn.onclick = showtaqreerPage;
    } else {
        backBtn.onclick = showHomePage;
    }
    
    listPage.style.display = 'block';
  }

  function openBook(title, link) {
    if(link === "#" || link === "URL") {
        alert("یہ کتاب ابھی دستیاب نہیں ہے۔");
        return;
    }
    document.getElementById('viewing-book-title').innerText = title;
    document.getElementById('pdf-frame').src = link;
    document.getElementById('pdf-view-page').style.display = 'block';
  }

  function closeViewer() {
    document.getElementById('pdf-view-page').style.display = 'none';
    document.getElementById('pdf-frame').src = "";
  }
</script>
