<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسلامی لائبریری - درسِ نظامی</title>
  <link href="https://fonts.googleapis.com/css2?family=Gulzar&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-green: #004d26; /* اسکرین شاٹ والا ہرا رنگ */
      --accent-gold: #ffd700;   /* سنہرا رنگ */
      --bg-color: white;      /* ہلکا سبز بیک گراؤنڈ */
      --card-bg: #cae8eb;       /* کارڈ کا رنگ */
    }

    body { 
      font-family: 'Gulzar', serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    /* مین کارڈ کنٹینر */
    .container {
      max-width: 360px;
      width: 100%;
      background: var(--card-bg);
      border: 2px solid var(--primary-green);
      border-radius: 15px;
      padding: 5px;
      text-align: center;
      min-height: 90vh;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* اوپر کا لوگو والا حصہ */
    .header-section {
      margin-bottom: 50px;
    }

img {
      width: 320px;
      height: 140px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      margin: 10px auto;
      display: block; /* سینٹر کرنے کے لیے */
    }

    .main-title {
      background-color: black;
      color: white;
      padding: 1px 50px;
      border-radius: 40px 40px;
      display: inline-block;
      font-size: 22px;
      margin-bottom: 30px;
    }

    /* بٹنوں کی ترتیب (دو کالمز) */
    .btn-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      font-family: 'Gulzar', serif;
      background: black;
      color: white;
      padding: 12px 1px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.8);
      transition: 0.3s;
    }

    button:active { transform: scale(0.95); }

    .page { display: none; animation: fadeIn 0.5s; }
    #home-page { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* فوٹر اور رابطہ */
    .footer-box {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.1);
      border-radius: 15px;
      font-size: 14px;
      color: #333;
    }

    /* پی ڈی ایف ویور */
    #pdf-view-page {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 9999;
    }

    iframe { width: 100%; height: calc(100% - 60px); border: none; }
    
    .viewer-header {
      height: 60px; background: var(--primary-green);
      display: flex; justify-content: space-between;
      align-items: center; padding: 0 15px; color: white;
    }
  .btn-blue {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }
    
    .btn-blue a {
      flex: 1;
      text-decoration: none;
    }

    .btn-blue button {
      width: 100%; /* لنک کے اندر بٹن پوری جگہ لے گا */
      padding: 10px 5px;
      font-size: 14px;
    }
.back-btn { background: #555; width: 100%; margin-top: 20px; 
    }
  </style>
</head>
<body>
<div class="container">
  
  <!-- ہوم پیج -->
  <div id="home-page" class="page">
     <button style="padding: 1.0px 50px; margin: 10px">درس اسلامی</button>
    <div class="header-section">
      <div>
        <img src="https://lh3.googleusercontent.com/pw/AP1GczNZvMbThJNkWToN3nCfRAVHPWGo_BsnzfWPXIMNc7H4rdQKazjREjn46U7sLRb9IMtedRjkmslbbiBEzyeTisJthNRu1VNwhfNTFAsgpg2_lfGrND4=w2400" alt="طَلَبُ الْعِلْمِ فَرِیْضَۃٌ عَلٰی کُلِّ مُسْلِمٍ وَمُسْلِمَۃٍ‘">
      </div>
    </div>

    <div class="btn-container">
  <!-- درس نظامی والا بٹن جماعت والے صفحے پر لے جائے گا -->
  <button onclick="showJamatPage()">درس نظامی</button>
  
  <!-- حدیث مبارکہ پر کلک کرنے سے براہ راست حدیث کی کتابیں نظر آئیں گی -->
  <button onclick="renderBooks('hadees', 'cat')">حدیث مبارکہ</button>
  
  <button onclick="renderBooks('dua', 'cat')">دعائیں</button>
  
  <button onclick="renderBooks('taqreer', 'cat')">نعت و تقریرکی کتابیں</button>
</div>
    
    <div class="footer-box">
      <p style="color: red; font-weight: bold;">نوٹ:خواہش مندحضرات اپنی کتابیں پبلش کروانے کے لیے رابطہ کریں</p>
      <div class="btn-blue">
        <a href="mailto:muhammadsarfrazalamsiraji@gmail.com"><button style="padding: 5px 25px">ای میل کریں</button></a>
        <a href="https://wa.me/9356812160"><button style="padding: 5px 25px"> WhatsApp</button></a>
      </div>
      <p style="margin: 1px">لہذا اپنی شکایت درج کریں: 9356812160</p>
      <b style="margin: 1px">دعا گوہ محمد سرفراز احمد سراجی</b>
    </div>
  </div>

  <!-- جماعت پیج -->
  <div id="jamat-page" class="page">
    <div class="main-title">جماعت منتخب کریں</div>
    <div class="btn-container">
      <button onclick="renderBooks('اعدادیہ','jamat')">اعدادیہ</button>
      <button onclick="renderBooks('اولیٰ', 'jamat')">اولیٰ</button>
      <button onclick="renderBooks('ثانیہ', 'jamat')">ثانیہ</button>
      <button onclick="renderBooks('ثالثہ', 'jamat')">ثالثہ</button>
      <button onclick="renderBooks('رابعہ', 'jamat')">رابعہ</button>
    </div>
    <button class="back-btn" onclick="showHomePage()">🏠 ہوم پیج</button>
  </div>

  <!-- کتاب لسٹ پیج -->
  <div id="books-list-page" class="page">
    <h2 id="list-title" style="color: var(--primary-green)">کتابیں</h2>
    <div id="books-list" class="btn-container"></div>
    <button class="back-btn" id="dynamic-back-btn">پیچھے جائیں</button>
  </div>

</div>

<!-- پی ڈی ایف ویور -->
<div id="pdf-view-page">
  <div class="viewer-header">
    <span id="viewing-book-title">لوڈ ہو رہا ہے...</span>
    <button onclick="closeViewer()" style="background:red; border:none; color:white; padding:5px 10px; border-radius:5px;">بند کریں</button>
  </div>
  <iframe id="pdf-frame" src=""></iframe>
</div>

<script>
  const allBooks = [
      {title: "منہا ح العربیہ", cat: "dars", jamat: "اعدادیہ", link: "https://drive.google.com/file/d/1gFN7wr3FMSPZxYWC6twePittOLb4nFop/preview"},
    {title: "تسہل المصادر" , cat: "dars", jamat: "اعدادیہ", link:"https://drive.google.com/file/d/1zrybm_XCrzjkXw4TavfiawG9gCVslenq/preview"},
    {title: "فارسی کی پہلی" ,cat: "dars", jamat: "اعدادیہ", link: "https://drive.google.com/file/d/1ij5qEzV_jfLkBT5Wcw2dmMrBNKiVRcfs/preview"},
  {title: "نحو میر", cat: "dars", jamat: "اولیٰ", link: "https://drive.google.com/file/d/1uC-s65_ggTdwjSe0wzftrSLxv2KWPj8X/preview"},
  {title: "پنج گنج", cat: "dars", jamat: "اولیٰ", link: "https://drive.google.com/file/d/1sSiBhYHLVlsoeCyFCI7vyYQiW_NrlQd6/preview"},
  {title: "بوستاں", cat: "dars", jamat: "اولیٰ", link: "https://drive.google.com/file/d/1CqJC69uUG-ijq90pwAb01cx7xuxU8OJE/preview"},
  {title: "مشکوٰۃ شریف", cat: "hadees", jamat: "", link: "URL"}, // حدیث کے لیے
  {title: "مسنون دعائیں", cat: "dua", jamat: "", link: "URL"},    // دعاؤں کے لیے
  {title: "حداںٔق بخشش", cat: "taqreer", link: "https://drive.google.com/file/d/1fJ3pX1t9opd21biyB5vpc8iDUgkUCgax/preview"},
];
  function showHomePage() { hideAllPages(); document.getElementById('home-page').style.display = 'block'; }
  function showJamatPage() { hideAllPages(); document.getElementById('jamat-page').style.display = 'block'; }
  function hideAllPages() { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); }

  function renderBooks(filterValue, type) {
    hideAllPages();
    const listPage = document.getElementById('books-list-page');
    const listContainer = document.getElementById('books-list');
    listContainer.innerHTML = "";
    
    const filtered = allBooks.filter(b => type === 'jamat' ? b.jamat === filterValue : b.cat === filterValue);

    if(filtered.length === 0) {
      listContainer.innerHTML = "<p>جلد شامل کی جائیں گی ان شاء اللہ</p>";
    } else {
      filtered.forEach(book => {
        const btn = document.createElement('button');
        btn.innerHTML = "📖 " + book.title;
        btn.onclick = () => openBook(book.title, book.link);
        listContainer.appendChild(btn);
      });
    }
    document.getElementById('dynamic-back-btn').onclick = () => type === 'jamat' ? showJamatPage() : showHomePage();
    listPage.style.display = 'block';
  }

  function openBook(title, link) {
    document.getElementById('viewing-book-title').innerText = title;
    document.getElementById('pdf-frame').src = link;
    document.getElementById('pdf-view-page').style.display = 'block';
  }

  function closeViewer() {
    document.getElementById('pdf-view-page').style.display = 'none';
    document.getElementById('pdf-frame').src = "";
  }
</script>

</body>
</html>
